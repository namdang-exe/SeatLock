server:
  port: 8081

spring:
  application:
    name: user-service
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/user_db
    username: seatlock
    password: seatlock
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

seatlock:
  jwt:
    algorithm: ${SEATLOCK_JWT_ALGORITHM:HS256}
    secret: ${SEATLOCK_JWT_SECRET:changeme-use-vault-in-production-minimum-32ch}
    private-key: ${SEATLOCK_JWT_PRIVATE_KEY:}
    public-key: ${SEATLOCK_JWT_PUBLIC_KEY:}
