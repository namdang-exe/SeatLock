seatlock:
  jwt:
    algorithm: RS256
    # Keys injected from AWS Secrets Manager via ECS task definition
    private-key: ${SEATLOCK_JWT_PRIVATE_KEY}
    public-key: ${SEATLOCK_JWT_PUBLIC_KEY}

spring:
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}:5432/user_db
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
  cloud:
    vault:
      enabled: false
