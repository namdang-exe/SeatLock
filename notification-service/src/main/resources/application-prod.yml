seatlock:
  notifications:
    queue-name: ${SQS_QUEUE_NAME:seatlock-events}
    from-address: ${SMTP_FROM_ADDRESS}
    default-recipient: ${SMTP_DEFAULT_RECIPIENT}

spring:
  cloud:
    vault:
      enabled: false
    aws:
      # ECS Fargate injects task role credentials via AWS_CONTAINER_CREDENTIALS_RELATIVE_URI.
      # The AWS SDK default chain picks these up automatically — do NOT set
      # instance-profile: true (that targets the EC2 metadata endpoint which
      # is unavailable in Fargate).
      sqs:
        # Empty = use real AWS SQS endpoint
        endpoint:
      region:
        static: ${AWS_REGION:us-east-1}
  mail:
    host: ${SMTP_HOST:email-smtp.us-east-1.amazonaws.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME}
    password: ${SMTP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
