name: Deploy to AWS

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (default: git SHA)'
        required: false
        default: ''

env:
  AWS_REGION: us-east-1
  ECR_PREFIX: seatlock

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Image tag: $TAG"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push — user-service
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f user-service/Dockerfile \
            -t $REGISTRY/$ECR_PREFIX/user-service:$TAG \
            -t $REGISTRY/$ECR_PREFIX/user-service:latest \
            .
          docker push $REGISTRY/$ECR_PREFIX/user-service:$TAG
          docker push $REGISTRY/$ECR_PREFIX/user-service:latest

      - name: Build and push — venue-service
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f venue-service/Dockerfile \
            -t $REGISTRY/$ECR_PREFIX/venue-service:$TAG \
            -t $REGISTRY/$ECR_PREFIX/venue-service:latest \
            .
          docker push $REGISTRY/$ECR_PREFIX/venue-service:$TAG
          docker push $REGISTRY/$ECR_PREFIX/venue-service:latest

      - name: Build and push — booking-service
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f booking-service/Dockerfile \
            -t $REGISTRY/$ECR_PREFIX/booking-service:$TAG \
            -t $REGISTRY/$ECR_PREFIX/booking-service:latest \
            .
          docker push $REGISTRY/$ECR_PREFIX/booking-service:$TAG
          docker push $REGISTRY/$ECR_PREFIX/booking-service:latest

      - name: Build and push — notification-service
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          TAG:      ${{ steps.tag.outputs.tag }}
        run: |
          docker build \
            -f notification-service/Dockerfile \
            -t $REGISTRY/$ECR_PREFIX/notification-service:$TAG \
            -t $REGISTRY/$ECR_PREFIX/notification-service:latest \
            .
          docker push $REGISTRY/$ECR_PREFIX/notification-service:$TAG
          docker push $REGISTRY/$ECR_PREFIX/notification-service:latest

  deploy:
    name: Deploy ECS Services
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Force new deployment — user-service
        run: |
          aws ecs update-service \
            --cluster seatlock-cluster \
            --service seatlock-user-service \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — venue-service
        run: |
          aws ecs update-service \
            --cluster seatlock-cluster \
            --service seatlock-venue-service \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — booking-service
        run: |
          aws ecs update-service \
            --cluster seatlock-cluster \
            --service seatlock-booking-service \
            --force-new-deployment \
            --no-cli-pager

      - name: Force new deployment — notification-service
        run: |
          aws ecs update-service \
            --cluster seatlock-cluster \
            --service seatlock-notification-service \
            --force-new-deployment \
            --no-cli-pager

      - name: Wait for services to stabilise
        run: |
          for svc in seatlock-user-service seatlock-venue-service seatlock-booking-service seatlock-notification-service; do
            echo "Waiting for $svc..."
            aws ecs wait services-stable \
              --cluster seatlock-cluster \
              --services $svc \
              --no-cli-pager
          done
          echo "All services stable."
