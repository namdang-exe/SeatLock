name: CI

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle
      - name: Unit tests
        run: ./gradlew test --no-daemon
      - name: Integration tests
        run: ./gradlew integrationTest --no-daemon
