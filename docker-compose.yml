services:
  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: seatlock
      POSTGRES_PASSWORD: seatlock
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seatlock"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI / REST API

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"   # SQS-compatible API
      - "9325:9325"   # Web UI
    volumes:
      - ./infra/elasticmq/elasticmq.conf:/opt/elasticmq.conf

volumes:
  postgres_data:
