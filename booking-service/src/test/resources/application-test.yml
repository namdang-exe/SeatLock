spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: test
        secret-key: test
      sqs:
        endpoint: http://localhost:9324

seatlock:
  sqs:
    queue-url: http://localhost:9324/000000000000/seatlock-events
  jwt:
    secret: "seatlock-test-jwt-secret-change-in-prod-32chars"
  service-jwt:
    secret: "seatlock-test-service-jwt-secret-change-in-prod"
    issuer: seatlock-internal
    subject: booking-service
    ttl-minutes: 5
  venue-service:
    base-url: http://localhost:8082
  expiry:
    batch-size: 500
    max-retries: 3
    retry-backoff-base-ms: 0
    interval-ms: 3600000
    initial-delay-ms: 3600000

resilience4j:
  circuitbreaker:
    instances:
      venue-service:
        # Low thresholds so circuit opens quickly in tests
        failureRateThreshold: 100
        waitDurationInOpenState: 1s
        slidingWindowSize: 2
        minimumNumberOfCalls: 2
        permittedNumberOfCallsInHalfOpenState: 1
  retry:
    instances:
      redis-ops:
        maxAttempts: 1
        waitDuration: 0ms
        retryExceptions:
          - org.springframework.dao.DataAccessException
      venue-http:
        maxAttempts: 1
        waitDuration: 0ms
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException

logging:
  level:
    com.seatlock: DEBUG
