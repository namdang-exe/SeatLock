server:
  port: 8083

spring:
  application:
    name: booking-service
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db
    username: seatlock
    password: seatlock
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false
  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: local-access-key
        secret-key: local-secret-key
      sqs:
        endpoint: http://localhost:9324

management:
  endpoints:
    web:
      exposure:
        include: health

seatlock:
  jwt:
    secret: "changeme-use-vault-in-production-minimum-32ch"
  service-jwt:
    secret: "local-dev-shared-secret-replace-in-prod-12345"
    issuer: seatlock-internal
    subject: booking-service
    ttl-minutes: 5
  venue-service:
    base-url: http://localhost:8082
  sqs:
    queue-url: http://localhost:9324/000000000000/seatlock-events
  expiry:
    batch-size: 500
    max-retries: 3
    retry-backoff-base-ms: 500
    interval-ms: 60000
    initial-delay-ms: 10000
