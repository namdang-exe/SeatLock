server:
  port: 8083

spring:
  application:
    name: booking-service
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: local-access-key
        secret-key: local-secret-key
      sqs:
        endpoint: http://localhost:9324
  datasource:
    url: jdbc:postgresql://localhost:5432/booking_db
    username: seatlock
    password: seatlock
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: localhost
      port: 6379
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha

seatlock:
  jwt:
    algorithm: ${SEATLOCK_JWT_ALGORITHM:HS256}
    secret: ${SEATLOCK_JWT_SECRET:changeme-use-vault-in-production-minimum-32ch}
    public-key: ${SEATLOCK_JWT_PUBLIC_KEY:}
  service-jwt:
    secret: ${SEATLOCK_SERVICE_JWT_SECRET:local-dev-shared-secret-replace-in-prod-12345}
    issuer: seatlock-internal
    subject: booking-service
    ttl-minutes: 5
  venue-datasource:
    url: jdbc:postgresql://localhost:5432/venue_db
    username: seatlock
    password: seatlock
  venue-service:
    base-url: http://localhost:8082
  sqs:
    queue-url: http://localhost:9324/000000000000/seatlock-events
  expiry:
    batch-size: 500
    max-retries: 3
    retry-backoff-base-ms: 500
    interval-ms: 60000
    initial-delay-ms: 10000

resilience4j:
  circuitbreaker:
    instances:
      venue-service:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      redis-ops:
        maxAttempts: 3
        waitDuration: 100ms
        retryExceptions:
          - org.springframework.dao.DataAccessException
      venue-http:
        maxAttempts: 2
        waitDuration: 200ms
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
