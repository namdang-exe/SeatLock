server:
  port: 8082

spring:
  application:
    name: venue-service
  cloud:
    vault:
      enabled: false
    compatibility-verifier:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    url: jdbc:postgresql://localhost:5432/venue_db
    username: seatlock
    password: seatlock
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

management:
  endpoints:
    web:
      exposure:
        include: health

seatlock:
  jwt:
    secret: "changeme-use-vault-in-production-minimum-32ch"
  service-jwt:
    secret: "local-dev-shared-secret-replace-in-prod-12345"
  slot:
    duration-minutes: 60
  cache:
    slots-ttl-seconds: 5
